# Lean default Codex configuration for the sandbox image.
#
# The launcher also passes these critical options on the command line so that
# aliases and proxy wrappers keep the same behavior even if this file drifts.

model = "gpt-5.5"
model_provider = "openai"
model_reasoning_effort = "high"

approval_policy = "never"
sandbox_mode = "danger-full-access"

web_search = "disabled"
project_doc_max_bytes = 0
hide_agent_reasoning = true

include_environment_context = false
include_permissions_instructions = false
include_apps_instructions = false
include_apply_patch_tool = true

[features]
apps = false
browser_use = false
browser_use_external = false
computer_use = false
enable_fanout = false
enable_mcp_apps = false
hooks = false
image_generation = false
in_app_browser = false
memories = false
multi_agent = false
multi_agent_v2 = false
plugin_hooks = false
plugins = false
shell_snapshot = false
skill_mcp_dependency_install = false
tool_call_mcp_elicitation = false
tool_search = false
tool_suggest = false
workspace_dependencies = false

[apps._default]
enabled = false
destructive_enabled = false
open_world_enabled = false

[history]
persistence = "none"

[tui]
notifications = false
animations = false
show_tooltips = false
status_line = []
terminal_title = []

[shell_environment_policy]
inherit = "core"
include_only = [
  "PATH",
  "HOME",
  "USER",
  "SHELL",
  "TERM",
  "LANG",
  "LC_*",
  "OPENAI_API_KEY",
  "HTTPS_PROXY",
  "HTTP_PROXY",
  "NO_PROXY",
  "NODE_EXTRA_CA_CERTS"
]
