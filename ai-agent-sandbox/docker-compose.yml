services:
  ai-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: vscode
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        CLI_CACHE_BUST: ${CLI_CACHE_BUST:-0}

    volumes:
      # Mount dev directory as workspace (read/write)
      - ../../:/workspace:cached

      # Mount ai-agent-sandbox as read-only (security: AI agents cannot modify their own config)
      - .:/workspace/workspace/ai-agent-sandbox:ro

      # Mount kubeconfig for kubectl access to host's Kind cluster
      - ~/.kube:/home/vscode/.kube:cached

    # Use host network for simplicity
    network_mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Map to Docker host IP

    # Keep container running
    command: sleep infinity

    user: vscode
